<!DOCTYPE html>
<html lang="en">
<head>
    <style>
    .todo-cont{
        max-width: 400px;
        border-radius: 10px;
        margin: 50px auto;
        box-shadow: 0 4px 10px rgba(0,0,0,0.7);
        background-color: rgb(60, 212, 149);
        padding: 20px;
    }
    input{
            width: 50%;
            padding: 10px;
            border-radius: 15px;
            border: 1px solid #ccc;
        }
    button{
        width: 25%;
        padding: 10px;
        border: none;
        border-radius: 10px;
        background-color:cyan;
        cursor: pointer;
    }
    ul{
        list-style: none;
        padding: 0;
    }
    li{
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: white;
        padding: 7px;
        
        margin-top: 10px;
        border-radius: 15px;
    }
    .completed{
        text-decoration: line-through;
        opacity: 0.6;
    }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="todo-cont">
    <input type="text" id="input" placeholder="Write something">
    <button id="btn">Добавить</button>
    <ul id="ul"></ul>
    </div>
    <script src="todoList.js"></script>
</body>
</html>
